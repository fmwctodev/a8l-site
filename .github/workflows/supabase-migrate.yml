name: Apply Supabase migrations

# Runs on every push to main that touches supabase/migrations/**
# (and via manual dispatch from the Actions tab). Pushes any local
# migration files whose version is not yet in the remote
# supabase_migrations.schema_migrations table.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  Personal access token from
#                          https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   Database password for the postgres role
#                          (Project Settings → Database → Connection string).
#
# The project ref is non-secret and lives in the workflow env below.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

# Don't let two migration jobs race against the same project.
concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  apply:
    name: supabase db push
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: kspcfjjrlgquzheokdtl
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push pending migrations
        run: supabase db push --linked

      - name: List applied migrations (for the run log)
        if: always()
        run: supabase migration list --linked
