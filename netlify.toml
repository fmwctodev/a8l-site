# Netlify config for the Next.js (App Router) site.
#
# Routing is handled by @netlify/plugin-nextjs, which reads .next/ output and
# serves App Router routes (static + SSG/ISR) directly. Every URL ships
# fully-rendered HTML on first byte — bots and humans see identical content.
#
# The Prerender.io edge function that originally backed bot crawls is gone:
# Next.js handles SSR natively, and the edge function's `Vary: User-Agent`
# header was fragmenting Netlify's CDN cache by user-agent and serving stale
# 404s to ClaudeBot.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
